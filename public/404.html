<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Bolão Copa 2026</title>
  <script>
    // GitHub Pages SPA redirect — preserva subrotas do React Router
    // Funciona com base path /bolao-copa-2026-v2/
    (function() {
      var l = window.location;
      var base = '/bolao-copa-2026-v2';
      // Pega a parte do pathname depois do base
      var pathname = l.pathname.slice(base.length) || '/';
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        base +
        '/?/' +
        pathname.replace(/^\//, '') +
        (l.search ? '&' + l.search.slice(1) : '') +
        l.hash
      );
    })();
  </script>
</head>
<body></body>
</html>
